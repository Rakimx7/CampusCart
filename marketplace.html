<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart — Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ─── GLOBAL ─── */
    :root {
      --bg: #080808; --bg2: #0f0f0f; --bg3: #151515; --bg4: #1c1c1c;
      --border: #252525; --border2: #2e2e2e;
      --text: #f0f0f0; --text2: #888; --text3: #555;
      --primary: #e8ff47; --primary-dim: rgba(232,255,71,0.12); --primary-dim2: rgba(232,255,71,0.05);
      --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.1);
      --danger: #ff4d4d; --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* ─── HEADER ─── */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 5%; height: 64px;
      background: rgba(8,8,8,0.96); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px);
    }
    .logo { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 2px; color: var(--primary); cursor: pointer; text-decoration: none; }
    .logo span { color: var(--text2); }
    nav a { margin: 0 14px; text-decoration: none; color: var(--text2); font-size: 0.83rem; font-weight: 500; transition: color 0.2s; }
    nav a:hover { color: var(--primary); }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .btn-sm { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-family: inherit; transition: all 0.2s; }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm-primary { background: var(--primary); color: #000; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 700; font-family: inherit; transition: all 0.2s; }
    .btn-sm-primary:hover { background: #d4e840; transform: translateY(-1px); }
    .nav-user { display: flex; align-items: center; gap: 10px; }
    .nav-chip { background: var(--bg3); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 0.78rem; color: var(--text2); }
    .nav-chip strong { color: var(--primary); }
    .btn-cart { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: inherit; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .btn-cart:hover { border-color: var(--primary); }
    .cart-badge { background: var(--primary); color: #000; border-radius: 10px; padding: 1px 6px; font-size: 0.65rem; font-weight: 800; display: none; }

    /* ─── MARKETPLACE ─── */
    .mkt-header { padding: 32px 5% 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .mkt-title { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; letter-spacing: 2px; }
    .mkt-title span { color: var(--primary); }
    .search-bar { display: flex; gap: 8px; }
    .search-bar input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 9px 16px; border-radius: 8px; font-family: inherit; font-size: 0.85rem; width: 260px; outline: none; }
    .search-bar input:focus { border-color: var(--primary); }
    .ai-banner { margin: 16px 5% 0; background: var(--primary-dim2); border: 1px solid rgba(232,255,71,0.2); border-radius: 10px; padding: 12px 18px; display: flex; align-items: center; gap: 12px; font-size: 0.82rem; }
    .scam-banner { background: rgba(255,77,77,0.1); border-color: rgba(255,77,77,0.3); color: var(--danger); }
    .scam-banner.safe { background: var(--accent-dim); border-color: rgba(0,229,160,0.3); color: var(--accent); }
    .cat-bar { display: flex; gap: 8px; padding: 20px 5% 0; flex-wrap: wrap; }
    .cat-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: all 0.2s; }
    .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 700; }

    /* Two-column layout */
    .market-layout { display: flex; gap: 24px; padding: 20px 5% 40px; align-items: flex-start; }
    .prod-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .market-sidebar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }
    @media(max-width:900px) { .market-layout { flex-direction: column; } .market-sidebar { width: 100%; } }

    /* Sidebar Cards */
    .sidebar-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
    .sidebar-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; color: var(--primary); }
    .trending-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .trending-item:last-child { border-bottom: none; }
    .trending-item span { font-family: var(--mono); color: var(--primary); }
    .trending-footer { font-size: 0.7rem; color: var(--text3); margin-top: 12px; text-align: center; }
    .ad-card { background: linear-gradient(145deg, #1a1a1a 0%, #111 100%); border-color: var(--primary); }
    .ad-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 10px; }
    .ad-content { display: flex; gap: 14px; }
    .ad-icon { font-size: 2.5rem; }
    .ad-title { font-weight: 700; font-size: 0.9rem; }
    .ad-desc { font-size: 0.75rem; color: var(--text2); margin: 6px 0; }
    .ad-cta { font-size: 0.75rem; color: var(--primary); font-weight: 700; cursor: pointer; }
    .plus-card { background: linear-gradient(145deg, #1e1e1e 0%, #141414 100%); border-color: #ffd700; }
    .plus-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .plus-title { font-weight: 800; font-size: 1.1rem; color: #ffd700; }
    .plus-price { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; margin: 6px 0; }
    .plus-features { list-style: none; margin: 16px 0; }
    .plus-features li { font-size: 0.8rem; padding: 4px 0; color: var(--text2); }
    .btn-plus { width: 100%; background: #ffd700; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-plus:hover { background: #e6c200; }

    /* Product card */
    .prod-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.25s; }
    .prod-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(232,255,71,0.08); }
    .prod-img { height: 140px; background: var(--bg4); position: relative; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background-size: cover; background-position: center; background-repeat: no-repeat; }
    .prod-img.has-image { font-size: 0; /* hide emoji */ }
    .prod-badge { position: absolute; top: 10px; left: 10px; background: var(--primary); color: #000; font-size: 0.6rem; font-weight: 800; padding: 2px 7px; border-radius: 10px; font-family: var(--mono); }
    .prod-body { padding: 14px; }
    .prod-cat { font-size: 0.65rem; font-family: var(--mono); color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
    .prod-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
    .prod-desc { font-size: 0.75rem; color: var(--text2); margin-bottom: 10px; line-height: 1.4; }
    .prod-footer { display: flex; justify-content: space-between; align-items: center; }
    .prod-price { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--primary); }
    .prod-orig { font-size: 0.7rem; color: var(--text3); text-decoration: line-through; font-family: var(--mono); }
    .btn-add { background: var(--primary); color: #000; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; font-weight: 700; font-family: inherit; transition: all 0.2s; }
    .btn-add:hover { background: #d4e840; }
    .btn-chat { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; }
    .btn-chat:hover { border-color: var(--primary); color: var(--primary); }
    .seller-contact { margin-top: 8px; font-size: 0.75rem; border-top: 1px dashed var(--border); padding-top: 8px; }

    /* Cart Drawer */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; }
    .cart-overlay.open { display: block; }
    .cart-drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 380px; max-width: 100vw; background: var(--bg2); border-left: 1px solid var(--border); z-index: 301; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
    .cart-drawer.open { transform: translateX(0); }
    .cart-head { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .cart-head h3 { font-size: 1rem; font-weight: 700; }
    .cart-close { background: none; border: none; color: var(--text2); font-size: 1.2rem; cursor: pointer; }
    .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .cart-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .cart-item-emoji { font-size: 2rem; flex-shrink: 0; background: var(--bg3); width: 52px; height: 52px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 0.85rem; font-weight: 600; }
    .cart-item-price { font-size: 0.8rem; color: var(--primary); font-family: var(--mono); margin-top: 2px; }
    .cart-item-rm { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.75rem; margin-top: 6px; }
    .cart-item-rm:hover { color: var(--danger); }
    .cart-empty { text-align: center; padding: 60px 0; color: var(--text3); }
    .cart-foot { padding: 20px 24px; border-top: 1px solid var(--border); }
    .cart-total { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .cart-total span { color: var(--text2); }
    .cart-total strong { font-family: var(--mono); font-size: 1.1rem; color: var(--primary); }
    .btn-checkout { width: 100%; background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 700; font-family: inherit; }
    .btn-checkout:hover { background: #d4e840; }
    .btn-checkout:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 400; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-overlay.open { display: flex; }
    .list-modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 500px; max-width: calc(100vw - 32px); max-height: 90vh; overflow-y: auto; }
    .list-modal-head { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .list-modal-head h3 { font-size: 1rem; font-weight: 700; }
    .modal-close-btn { background: none; border: none; color: var(--text2); font-size: 1.3rem; cursor: pointer; }
    .list-modal-body { padding: 24px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--bg4); border: 1px solid var(--border2); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: inherit; font-size: 0.88rem; }
    .btn-full { width: 100%; background: var(--primary); color: #000; border: none; padding: 13px; border-radius: 8px; font-weight: 700; cursor: pointer; }

    /* Image Upload */
    .image-upload-area {
      border: 2px dashed var(--border2);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .image-upload-area:hover { border-color: var(--primary); }
    .image-upload-area img {
      max-width: 100%;
      max-height: 150px;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .image-upload-area .placeholder-text {
      color: var(--text3);
      font-size: 0.85rem;
    }
    #li-image-input { display: none; }

    /* Chat Modal */
    .chat-modal-container { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 400px; max-width: calc(100vw - 32px); max-height: 600px; display: flex; flex-direction: column; }
    .chat-modal-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 200px; }
    .chat-msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.85rem; }
    .chat-msg.seller { background: var(--bg3); align-self: flex-start; border: 1px solid var(--border); }
    .chat-msg.buyer { background: var(--primary-dim2); align-self: flex-end; border: 1px solid var(--primary-dim); }
    .chat-input-area { display: flex; padding: 12px; border-top: 1px solid var(--border); gap: 8px; }
    .chat-input-area input { flex:1; background: var(--bg3); border:1px solid var(--border2); color:var(--text); padding:10px; border-radius:8px; }
    .chat-premium-prompt { padding: 12px; background: var(--primary-dim2); border-top: 1px solid var(--border); font-size:0.8rem; text-align:center; }

    /* Toast */
    .toast { position: fixed; bottom: 28px; right: 28px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>
<!-- HEADER (same as before, unchanged) -->
<header>
  <a href="index.html" class="logo">CAMPUS<span>CART</span></a>
  <nav>
    <a href="landing.html">Home</a>
    <a href="landing.html#features">Features</a>
    <a href="landing.html#roadmap">Roadmap</a>
    <a href="landing.html#team">Team</a>
  </nav>
  <div class="header-actions" id="nav-guest">
    <button class="btn-sm" onclick="openAuth('login')">Log In</button>
    <button class="btn-sm-primary" onclick="openAuth('register')">Sign Up</button>
  </div>
  <div id="nav-member" style="display:none" class="nav-user">
    <div class="nav-chip">Hi, <strong id="nav-name"></strong></div>
    <button class="btn-sm" id="plusToggleBtn" onclick="togglePlusSubscription()" style="border-color:#ffd700; color:#ffd700;">⭐ Plus</button>
    <button class="btn-cart" onclick="toggleCart()"><span>🛒</span> Cart <span class="cart-badge" id="cart-count">0</span></button>
    <button class="btn-sm" id="sellItemBtn" onclick="handleSellItemClick()"><span id="sellBtnText">🔒 + Sell Item</span></button>
    <button class="btn-sm" style="color:var(--danger)" onclick="doLogout()">Logout</button>
  </div>
</header>

<!-- MARKETPLACE CONTENT (unchanged) -->
<div class="mkt-header">...</div>
<div class="ai-banner">...</div>
<div class="ai-banner" id="scamDetectionBanner"></div>
<div class="cat-bar">...</div>
<div class="market-layout">
  <div class="prod-grid" id="prod-grid"></div>
  <div class="market-sidebar">...</div>
</div>

<!-- CART DRAWER, CHAT MODAL, TOAST (unchanged) -->

<!-- SELL ITEM MODAL with IMAGE UPLOAD -->
<div class="modal-overlay" id="list-modal">
  <div class="list-modal">
    <div class="list-modal-head">
      <h3>+ List an Item for Sale</h3>
      <button class="modal-close-btn" onclick="closeListModal()">✕</button>
    </div>
    <div class="list-modal-body">
      <div class="form-group">
        <label>Item Name</label>
        <input type="text" id="li-name" placeholder="e.g. Calculus by Leithold">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="li-cat">
          <option value="books">📚 Books</option>
          <option value="electronics">💻 Electronics</option>
          <option value="uniforms">👕 Uniforms</option>
          <option value="lab">🔬 Lab</option>
          <option value="tools">🔧 Tools</option>
          <option value="misc">🎒 Misc</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price (₱)</label>
        <input type="number" id="li-price" placeholder="350">
      </div>
      <div class="form-group">
        <label>Condition</label>
        <select id="li-cond">
          <option>Like New</option>
          <option>Good</option>
          <option>Fair</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="li-desc" placeholder="e.g. Minor highlights">
      </div>

      <!-- IMAGE UPLOAD -->
      <div class="form-group">
        <label>Item Image</label>
        <div class="image-upload-area" id="image-upload-area" onclick="document.getElementById('li-image-input').click()">
          <img id="li-image-preview" src="" alt="Preview" style="display:none;">
          <span class="placeholder-text" id="upload-placeholder">📷 Click to upload an image</span>
        </div>
        <input type="file" id="li-image-input" accept="image/*" onchange="handleImageSelect(event)">
      </div>

      <button class="btn-full" onclick="submitListing()">🚀 List Item</button>
    </div>
  </div>
</div>

<!-- (keep existing modals and scripts) -->

<script>
  // ─── DATA ────────────────────────────────────
  // ... (PRODUCTS array unchanged, but now may contain 'image' property)

  let selectedImageDataUrl = null; // to store the resized image

  // Resize image to max 200x200 and return data URL
  function resizeImage(file, maxWidth = 200, maxHeight = 200) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let width = img.width;
          let height = img.height;
          if (width > maxWidth || height > maxHeight) {
            const ratio = Math.min(maxWidth / width, maxHeight / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function handleImageSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    try {
      const dataUrl = await resizeImage(file);
      selectedImageDataUrl = dataUrl;
      const preview = document.getElementById('li-image-preview');
      preview.src = dataUrl;
      preview.style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
    } catch (err) {
      showToast('⚠️ Failed to load image. Please try another.');
      selectedImageDataUrl = null;
    }
  }

  function clearImageUpload() {
    selectedImageDataUrl = null;
    const preview = document.getElementById('li-image-preview');
    preview.src = '';
    preview.style.display = 'none';
    document.getElementById('upload-placeholder').style.display = 'block';
    document.getElementById('li-image-input').value = '';
  }

  // Modify submitListing to include image
  function submitListing() {
    const name = document.getElementById('li-name').value.trim();
    const cat = document.getElementById('li-cat').value;
    const price = parseInt(document.getElementById('li-price').value);
    const cond = document.getElementById('li-cond').value;
    const desc = document.getElementById('li-desc').value.trim() || 'Good condition.';
    if (!name || !price) { showToast('Please fill name and price.'); return; }
    const emojis = { books:'📗', electronics:'💻', uniforms:'👕', lab:'🔬', tools:'🔧', misc:'🎒' };
    const newItem = {
      id: nextId++,
      name,
      cat,
      price,
      origPrice: Math.round(price * 2.5),
      emoji: emojis[cat],
      desc,
      cond,
      seller: currentUser.name,
      uni: currentUser.uni,
      sellerEmail: currentUser.email,
      sellerPhone: '+63 9XX XXX XXXX',
      image: selectedImageDataUrl || null
    };
    PRODUCTS.unshift(newItem);
    closeListModal();
    clearImageUpload();
    document.getElementById('li-name').value = '';
    document.getElementById('li-price').value = '';
    document.getElementById('li-desc').value = '';
    renderProds();
    showToast('🚀 Item listed!');
  }

  // Update renderProds to show image if available
  function renderProds() {
    // ... (existing filtering code)
    grid.innerHTML = filtered.map(p => {
      const hasImage = !!p.image;
      const imgStyle = hasImage ? `background-image: url(${p.image});` : '';
      const imgClass = hasImage ? 'prod-img has-image' : 'prod-img';
      return `
      <div class="prod-card">
        <div class="${imgClass}" style="${imgStyle}">${!hasImage ? p.emoji : ''}</div>
        <div class="prod-body">
          <!-- ... rest unchanged ... -->
        </div>
      </div>`;
    }).join('');
  }

  // Also update addToCart to preserve image
  // (cart items can show small image or emoji; keep emoji for now)

  // close modal also reset image
  function closeListModal() {
    document.getElementById('list-modal').classList.remove('open');
    clearImageUpload();
  }

  // ... rest of existing scripts (updateHeader, cart, chat, etc.) ...
</script>
</body>
</html>
