<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart — Order Confirmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ─── GLOBAL ─── */
    :root {
      --bg: #080808; --bg2: #0f0f0f; --bg3: #151515; --bg4: #1c1c1c;
      --border: #252525; --border2: #2e2e2e;
      --text: #f0f0f0; --text2: #888; --text3: #555;
      --primary: #e8ff47; --primary-dim: rgba(232,255,71,0.12);
      --accent: #00e5a0; --danger: #ff4d4d;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* ─── HEADER ─── */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 5%; height: 64px;
      background: rgba(8,8,8,0.96); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
    }
    .logo { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 2px; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--text2); }
    .nav-chip { background: var(--bg3); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 0.78rem; color: var(--text2); }
    .nav-chip strong { color: var(--primary); }

    /* ─── SUCCESS CONTENT ─── */
    .success-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 5%;
    }
    .success-card {
      max-width: 600px;
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .success-icon {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: pop 0.4s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: 3.5rem;
      letter-spacing: 3px;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .sub-message {
      color: var(--text2);
      font-size: 1rem;
      margin-bottom: 32px;
    }
    .order-details {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: left;
      margin-bottom: 32px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text2); }
    .detail-value { font-family: var(--mono); color: var(--text); font-weight: 500; }
    .order-ref {
      background: var(--primary-dim);
      border: 1px solid rgba(232,255,71,0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
    }
    .order-ref .ref-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .order-ref .ref-number {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      word-break: break-all;
    }
    .action-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: var(--primary);
      color: #000;
      border: none;
    }
    .btn-primary:hover { background: #d4e840; transform: translateY(-2px); }
    .btn-secondary {
      background: none;
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }

    .footer-note {
      margin-top: 40px;
      color: var(--text3);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a href="index.html" class="logo">CAMPUS<span>CART</span></a>
  <div class="nav-chip" id="user-chip">👤 <strong id="header-user">Student</strong></div>
</header>

<!-- SUCCESS CARD -->
<div class="success-container">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <h1>ORDER PLACED!</h1>
    <p class="sub-message">Your order has been confirmed. The seller will contact you to finalize meetup details.</p>

    <div class="order-ref" id="orderRefBox">
      <div class="ref-label">Order Reference</div>
      <div class="ref-number" id="orderRefNumber">CC-000000</div>
    </div>

    <div class="order-details" id="orderDetailsContainer">
      <!-- Dynamically filled via JS -->
       <div class="detail-row"><span class="detail-label">ID Verified</span><span class="detail-value">✅ Yes (Student ID confirmed)</span></div>
    </div>

    <div class="action-buttons">
      <a href="marketplace.html" class="btn btn-primary">Continue Shopping</a>
      <a href="index.html" class="btn btn-secondary">Back to Home</a>
    </div>
    <div class="footer-note">
      📍 Meet the seller at your chosen campus location. Bring your Student ID.
    </div>
  </div>
</div>

<script>
  // Load user info
  const currentUser = JSON.parse(localStorage.getItem('campus_current_user')) || null;
  if (currentUser) {
    document.getElementById('header-user').textContent = currentUser.name.split(' ')[0];
  } else {
    document.getElementById('header-user').textContent = 'Guest';
  }

  // Load order details from localStorage
  const order = JSON.parse(localStorage.getItem('campus_last_order')) || null;

  if (!order) {
    // If no order (maybe direct access), show fallback
    document.getElementById('orderDetailsContainer').innerHTML = `
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">No recent order</span></div>
    `;
    document.getElementById('orderRefNumber').textContent = 'N/A';
  } else {
    // Populate reference number
    document.getElementById('orderRefNumber').textContent = order.orderId || 'CC-000000';

    // Build details HTML
    const detailsHtml = `
      <div class="detail-row"><span class="detail-label">Items</span><span class="detail-value">${order.items} item${order.items > 1 ? 's' : ''}</span></div>
      <div class="detail-row"><span class="detail-label">Total Paid</span><span class="detail-value">₱${order.total.toLocaleString()}</span></div>
      <div class="detail-row"><span class="detail-label">You Saved</span><span class="detail-value" style="color:var(--accent);">₱${order.savings.toLocaleString()}</span></div>
      <div class="detail-row"><span class="detail-label">Meetup Location</span><span class="detail-value">${order.meetup}</span></div>
      <div class="detail-row"><span class="detail-label">Date & Time</span><span class="detail-value">${order.datetime}</span></div>
      <div class="detail-row"><span class="detail-label">Payment Method</span><span class="detail-value">${order.payment}</span></div>
      <div class="detail-row"><span class="detail-label">Student</span><span class="detail-value">${order.name} (${order.sid})</span></div>
    `;
    document.getElementById('orderDetailsContainer').innerHTML = detailsHtml;
  }

  // Optionally clear last order after displaying? Not necessary, but could be done.
  // We'll keep it so refresh still shows.
</script>

</body>
</html>
