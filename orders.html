<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart — Order History</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808; --bg2: #0f0f0f; --bg3: #151515; --bg4: #1c1c1c;
      --border: #252525; --border2: #2e2e2e;
      --text: #f0f0f0; --text2: #888; --text3: #555;
      --primary: #e8ff47; --primary-dim: rgba(232,255,71,0.12);
      --accent: #00e5a0; --danger: #ff4d4d;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 5%; height: 64px;
      background: rgba(8,8,8,0.96); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px);
    }
    .logo { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 2px; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--text2); }
    nav a { margin: 0 14px; text-decoration: none; color: var(--text2); font-size: 0.83rem; font-weight: 500; transition: color 0.2s; }
    nav a:hover, nav a.active { color: var(--primary); }
    .nav-chip { background: var(--bg3); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 0.78rem; color: var(--text2); }
    .nav-chip strong { color: var(--primary); }

    .container { max-width: 900px; margin: 40px auto; padding: 0 5%; }
    .page-title { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 30px; }
    .page-title span { color: var(--primary); }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
    .empty-state .emoji { font-size: 4rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1.1rem; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 12px 24px; border-radius: 8px; font-weight: 700; text-decoration: none; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-primary:hover { background: #d4e840; transform: translateY(-2px); }
    .order-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; transition: all 0.2s; }
    .order-card:hover { border-color: var(--primary); }
    .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .order-id { font-family: var(--mono); font-weight: 700; color: var(--primary); font-size: 1rem; }
    .order-date { color: var(--text3); font-size: 0.8rem; }
    .order-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .detail-item { display: flex; flex-direction: column; }
    .detail-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 4px; }
    .detail-value { font-size: 0.9rem; color: var(--text2); }
    .items-list { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
    .items-list .item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; }
    .items-list .item-name { color: var(--text2); }
    .items-list .item-price { font-family: var(--mono); color: var(--primary); }
    .order-total { display: flex; justify-content: space-between; margin-top: 12px; font-weight: 700; }
    .order-total span:last-child { color: var(--primary); font-family: var(--mono); }
    .toast { position: fixed; bottom: 28px; right: 28px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">CAMPUS<span>CART</span></a>
  <nav>
    <a href="landing.html">Home</a>
    <a href="marketplace.html">Marketplace</a>
    <a href="orders.html" class="active">Orders</a>
    <a href="landing.html#roadmap">Roadmap</a>
  </nav>
  <div class="nav-chip" id="user-chip">👤 <strong id="header-user">Student</strong></div>
</header>

<div class="container">
  <div class="page-title">ORDER <span>HISTORY</span></div>
  <div id="orders-container">
    <!-- Filled dynamically -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const currentUser = JSON.parse(localStorage.getItem('campus_current_user')) || null;
  if (currentUser) {
    document.getElementById('header-user').textContent = currentUser.name.split(' ')[0];
  }

  function renderOrders() {
    const history = JSON.parse(localStorage.getItem('campus_order_history')) || [];
    const container = document.getElementById('orders-container');
    
    if (history.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">📦</div>
          <p>No orders yet.</p>
          <a href="marketplace.html" class="btn btn-primary">Start Shopping</a>
        </div>
      `;
      return;
    }

    container.innerHTML = history.map(order => {
      const date = new Date(order.date);
      const formattedDate = date.toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' }) + ' ' + date.toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' });
      
      const itemsHtml = (order.cartItems || []).map(item => `
        <div class="item">
          <span class="item-name">${item.emoji || ''} ${item.name}</span>
          <span class="item-price">₱${item.price.toLocaleString()}</span>
        </div>
      `).join('');

      return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">#${order.orderId}</div>
              <div class="order-date">${formattedDate}</div>
            </div>
            <div class="order-id" style="color:var(--accent);">✅ Completed</div>
          </div>
          <div class="order-details">
            <div class="detail-item">
              <span class="detail-label">Meetup</span>
              <span class="detail-value">${order.meetup || 'N/A'}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Date/Time</span>
              <span class="detail-value">${order.datetime || 'To be arranged'}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Payment</span>
              <span class="detail-value">${order.payment}</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Items</span>
              <span class="detail-value">${order.items} item${order.items !== 1 ? 's' : ''}</span>
            </div>
          </div>
          <div class="items-list">
            ${itemsHtml}
          </div>
          <div class="order-total">
            <span>Total</span>
            <span>₱${order.total.toLocaleString()}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  renderOrders();

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
