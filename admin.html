<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ─── GLOBAL ─── */
    :root {
      --bg: #080808; --bg2: #0f0f0f; --bg3: #151515; --bg4: #1c1c1c;
      --border: #252525; --border2: #2e2e2e;
      --text: #f0f0f0; --text2: #888; --text3: #555;
      --primary: #e8ff47; --primary-dim: rgba(232,255,71,0.12);
      --accent: #00e5a0; --danger: #ff4d4d;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 5%; height: 64px;
      background: rgba(8,8,8,0.96); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px);
    }
    .logo { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 2px; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--text2); }
    nav a { margin: 0 14px; text-decoration: none; color: var(--text2); font-size: 0.83rem; font-weight: 500; transition: color 0.2s; }
    nav a:hover { color: var(--primary); }
    .btn-sm { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-family: inherit; transition: all 0.2s; }
    .btn-sm:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* ─── ADMIN CONTENT ─── */
    .admin-container {
      max-width: 1200px; margin: 40px auto; padding: 0 5%;
    }
    .page-title { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 30px; }
    .page-title span { color: var(--primary); }

    /* Login Card */
    .login-card {
      max-width: 400px; margin: 80px auto; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; text-align: center;
    }
    .login-card h2 { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 2px; margin-bottom: 24px; }
    .login-card h2 span { color: var(--primary); }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 6px; }
    .form-group input { width: 100%; background: var(--bg4); border: 1px solid var(--border2); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: inherit; font-size: 0.9rem; }
    .btn-full { width: 100%; background: var(--primary); color: #000; border: none; padding: 13px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
    .btn-full:hover { background: #d4e840; }
    .err-msg { background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); border-radius: 6px; padding: 10px 14px; font-size: 0.8rem; color: var(--danger); margin-bottom: 14px; display: none; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
    .tab-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 10px 24px; border-radius: 30px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
    .tab-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

    /* Tables */
    .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--bg3); border-radius: 12px; overflow: hidden; }
    .data-table th { text-align: left; padding: 14px 16px; background: var(--bg2); color: var(--text2); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg4); }
    .empty-state { text-align: center; padding: 60px 0; color: var(--text3); }
    .action-btn { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; margin-right: 4px; transition: all 0.2s; }
    .action-btn:hover { border-color: var(--primary); color: var(--primary); }
    .action-btn.delete:hover { border-color: var(--danger); color: var(--danger); }
    .logout-link { margin-left: auto; font-size: 0.85rem; color: var(--danger); cursor: pointer; }

    .toast { position: fixed; bottom: 28px; right: 28px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">CAMPUS<span>CART</span></a>
  <nav>
    <a href="index.html">Main Site</a>
    <a href="marketplace.html">Marketplace</a>
  </nav>
  <div id="logout-area" style="display:none;">
    <button class="btn-sm" onclick="doAdminLogout()" style="color:var(--danger);">Logout</button>
  </div>
</header>

<div class="admin-container" id="app">
  <!-- Filled dynamically -->
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── ADMIN AUTH ──────────────────────────────
  const ADMIN_CREDENTIALS = { email: 'admin@campus.edu.ph', password: 'admin123' };
  let adminLoggedIn = JSON.parse(localStorage.getItem('campus_admin_logged_in')) || false;

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Load data
  function getUsers() {
    return JSON.parse(localStorage.getItem('campus_users')) || [];
  }
  function getProducts() {
    return JSON.parse(localStorage.getItem('campus_products')) || [];
  }
  function getOrders() {
    return JSON.parse(localStorage.getItem('campus_order_history')) || [];
  }

  // Save data back (used after deletion)
  function saveUsers(users) { localStorage.setItem('campus_users', JSON.stringify(users)); }
  function saveProducts(products) { localStorage.setItem('campus_products', JSON.stringify(products)); }
  function saveOrders(orders) { localStorage.setItem('campus_order_history', JSON.stringify(orders)); }

  // ─── DELETE HANDLERS ─────────────────────────
  function deleteUser(index) {
    if (!confirm('Delete this user?')) return;
    let users = getUsers();
    users.splice(index, 1);
    saveUsers(users);
    renderUsers();
    showToast('User deleted.');
  }

  function deleteProduct(index) {
    if (!confirm('Delete this listing?')) return;
    let products = getProducts();
    products.splice(index, 1);
    saveProducts(products);
    renderProducts();
    showToast('Product deleted.');
  }

  function deleteOrder(index) {
    if (!confirm('Delete this order?')) return;
    let orders = getOrders();
    orders.splice(index, 1);
    saveOrders(orders);
    renderOrders();
    showToast('Order deleted.');
  }

  // ─── RENDER FUNCTIONS ────────────────────────
  function renderLogin() {
    document.getElementById('app').innerHTML = `
      <div class="login-card">
        <h2>ADMIN <span>PANEL</span></h2>
        <div class="err-msg" id="admin-err">Invalid credentials.</div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="admin-email" placeholder="admin@campus.edu.ph">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="admin-password" placeholder="password">
        </div>
        <button class="btn-full" onclick="doAdminLogin()">Log In</button>
        <p style="margin-top:16px; font-size:0.8rem; color:var(--text3);">
          Demo: admin@campus.edu.ph / admin123
        </p>
      </div>
    `;
    document.getElementById('logout-area').style.display = 'none';
  }

  function renderDashboard() {
    document.getElementById('logout-area').style.display = 'block';
    document.getElementById('app').innerHTML = `
      <div class="page-title">ADMIN <span>DASHBOARD</span></div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('users', this)">👥 Users</button>
        <button class="tab-btn" onclick="switchTab('products', this)">📦 Products</button>
        <button class="tab-btn" onclick="switchTab('orders', this)">🧾 Orders</button>
      </div>
      <div id="tab-content"></div>
    `;
    renderUsers();
  }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'users') renderUsers();
    else if (tab === 'products') renderProducts();
    else if (tab === 'orders') renderOrders();
  }

  function renderUsers() {
    const users = getUsers();
    let html = '';
    if (users.length === 0) {
      html = '<div class="empty-state">No registered users.</div>';
    } else {
      html = `<table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Student ID</th><th>Course</th><th>University</th><th>Actions</th></tr></thead>
        <tbody>`;
      users.forEach((u, i) => {
        html += `<tr>
          <td>${u.name || ''}</td>
          <td>${u.email || ''}</td>
          <td>${u.sid || ''}</td>
          <td>${u.course || ''}</td>
          <td>${u.uni || ''}</td>
          <td><button class="action-btn delete" onclick="deleteUser(${i})">Delete</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
    }
    document.getElementById('tab-content').innerHTML = html;
  }

  function renderProducts() {
    const products = getProducts();
    let html = '';
    if (products.length === 0) {
      html = '<div class="empty-state">No products available.</div>';
    } else {
      html = `<table class="data-table">
        <thead><tr><th>Item</th><th>Seller</th><th>Price</th><th>Category</th><th>Condition</th><th>Actions</th></tr></thead>
        <tbody>`;
      products.forEach((p, i) => {
        html += `<tr>
          <td>${p.emoji || ''} ${p.name || ''}</td>
          <td>${p.seller || ''}</td>
          <td>₱${p.price?.toLocaleString() || '0'}</td>
          <td>${p.cat || ''}</td>
          <td>${p.cond || ''}</td>
          <td><button class="action-btn delete" onclick="deleteProduct(${i})">Delete</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
    }
    document.getElementById('tab-content').innerHTML = html;
  }

  function renderOrders() {
    const orders = getOrders();
    let html = '';
    if (orders.length === 0) {
      html = '<div class="empty-state">No orders yet.</div>';
    } else {
      html = `<table class="data-table">
        <thead><tr><th>Order ID</th><th>Date</th><th>Student</th><th>Total</th><th>Payment</th><th>Actions</th></tr></thead>
        <tbody>`;
      orders.forEach((o, i) => {
        const date = new Date(o.date).toLocaleDateString('en-PH');
        html += `<tr>
          <td>#${o.orderId}</td>
          <td>${date}</td>
          <td>${o.name || ''}</td>
          <td>₱${o.total?.toLocaleString() || '0'}</td>
          <td>${o.payment || ''}</td>
          <td><button class="action-btn delete" onclick="deleteOrder(${i})">Delete</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
    }
    document.getElementById('tab-content').innerHTML = html;
  }

  // ─── AUTH ─────────────────────────────────────
  function doAdminLogin() {
    const email = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    if (email === ADMIN_CREDENTIALS.email && password === ADMIN_CREDENTIALS.password) {
      adminLoggedIn = true;
      localStorage.setItem('campus_admin_logged_in', JSON.stringify(true));
      renderDashboard();
      showToast('Welcome, Admin!');
    } else {
      document.getElementById('admin-err').style.display = 'block';
    }
  }

  function doAdminLogout() {
    adminLoggedIn = false;
    localStorage.removeItem('campus_admin_logged_in');
    renderLogin();
    showToast('Logged out of admin panel.');
  }

  // Initial load
  if (adminLoggedIn) {
    renderDashboard();
  } else {
    renderLogin();
  }
</script>
</body>
</html>
